spring.datasource.url=jdbc:h2:mem:ecommerce;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
app.jwt.secret=ThisIsATestSecretKeyThatMustBeLongEnough123456
app.jwt.access-token-expiration=PT2H
app.pagination.default-page-size=10
app.pagination.max-page-size=100
