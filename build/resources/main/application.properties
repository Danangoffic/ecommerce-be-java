spring.application.name=ecommerce
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${JWT_SECRET:ThisIsADevelopmentSecretKeyThatMustBeLongEnough123456}
app.jwt.access-token-expiration=PT2H
app.pagination.default-page-size=10
app.pagination.max-page-size=100

server.error.include-stacktrace=never
